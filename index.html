<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuscript Submission Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .file-drop-area { transition: all 0.3s ease; }
        .file-drop-area:hover { border-color: #3b82f6; background-color: #eff6ff; }
        
        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Main Container -->
    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <!-- Header -->
        <div class="bg-blue-900 text-white p-6 sm:p-8 text-center">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Manuscript Submission Portal</h1>
            <p class="mt-2 text-blue-200 text-sm sm:text-base">Upload your final thesis manuscript in PDF and DOCX formats.</p>
        </div>

        <!-- Form -->
        <form id="submissionForm" class="p-6 sm:p-8 space-y-6">
            
            <!-- Section 1: Academic Details -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Adviser -->
                <div>
                    <label for="adviser" class="block text-sm font-semibold text-gray-700 mb-1">Adviser</label>
                    <div class="relative">
                        <select id="adviser" required class="w-full appearance-none rounded-lg border border-gray-300 py-2.5 px-4 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                            <option value="" disabled selected>Select your adviser</option>
                            <option value="Mr. Agbayani">Mr. Agbayani</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <i class="fas fa-chevron-down text-sm"></i>
                        </div>
                    </div>
                </div>

                <!-- Section -->
                <div>
                    <label for="section" class="block text-sm font-semibold text-gray-700 mb-1">Section</label>
                    <div class="relative">
                        <select id="section" required class="w-full appearance-none rounded-lg border border-gray-300 py-2.5 px-4 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                            <option value="" disabled selected>Select section</option>
                            <option value="IT601A">IT601A</option>
                            <option value="IT601M">IT601M</option>
                            <option value="IT601P">IT601P</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <i class="fas fa-chevron-down text-sm"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section 2: Group Members -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Group Members (Surnames Only)</label>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <input type="text" id="member1" required placeholder="Surname 1 (e.g. Dela Cruz)" class="w-full rounded-lg border border-gray-300 py-2.5 px-4 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    <input type="text" id="member2" required placeholder="Surname 2 (e.g. Gapasin)" class="w-full rounded-lg border border-gray-300 py-2.5 px-4 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    <input type="text" id="member3" required placeholder="Surname 3 (e.g. Del Rosa)" class="w-full rounded-lg border border-gray-300 py-2.5 px-4 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                </div>
            </div>

            <!-- Section 3: Thesis Title -->
            <div>
                <label for="thesisTitle" class="block text-sm font-semibold text-gray-700 mb-1">Thesis Title</label>
                <p class="text-xs text-gray-500 mb-2">Text will automatically format to Title Case.</p>
                <input type="text" id="thesisTitle" required placeholder="e.g. Web-based POS for Matute Shop" class="w-full rounded-lg border border-gray-300 py-2.5 px-4 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
            </div>

            <!-- Section 4: File Uploads -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-2">
                <!-- PDF Upload -->
                <div class="relative">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Manuscript (PDF)</label>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg file-drop-area relative bg-gray-50 cursor-pointer" onclick="document.getElementById('pdfFile').click()">
                        <div class="space-y-1 text-center">
                            <i class="fas fa-file-pdf text-red-500 text-3xl mb-2"></i>
                            <div class="flex text-sm text-gray-600 justify-center">
                                <span class="relative cursor-pointer rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                                    <span>Upload a file</span>
                                    <input id="pdfFile" name="pdfFile" type="file" accept=".pdf" required class="sr-only" onchange="updateFileName('pdfFile', 'pdfName')">
                                </span>
                            </div>
                            <p class="text-xs text-gray-500">PDF up to 20MB</p>
                        </div>
                    </div>
                    <p id="pdfName" class="mt-2 text-sm text-green-600 font-medium hidden flex items-center justify-center"><i class="fas fa-check-circle mr-1"></i> <span></span></p>
                </div>

                <!-- DOCX Upload -->
                <div class="relative">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Manuscript (DOCX)</label>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg file-drop-area relative bg-gray-50 cursor-pointer" onclick="document.getElementById('docxFile').click()">
                        <div class="space-y-1 text-center">
                            <i class="fas fa-file-word text-blue-500 text-3xl mb-2"></i>
                            <div class="flex text-sm text-gray-600 justify-center">
                                <span class="relative cursor-pointer rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                                    <span>Upload a file</span>
                                    <input id="docxFile" name="docxFile" type="file" accept=".doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" required class="sr-only" onchange="updateFileName('docxFile', 'docxName')">
                                </span>
                            </div>
                            <p class="text-xs text-gray-500">DOCX up to 20MB</p>
                        </div>
                    </div>
                    <p id="docxName" class="mt-2 text-sm text-green-600 font-medium hidden flex items-center justify-center"><i class="fas fa-check-circle mr-1"></i> <span></span></p>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="statusMessage" class="hidden p-4 rounded-lg text-sm text-center font-medium transition-all"></div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all shadow-md mt-4">
                <span id="btnText"><i class="fas fa-paper-plane mr-2"></i>Submit Manuscript</span>
                <span id="btnLoader" class="hidden"><span class="loader"></span> Sending/Uploading...</span>
            </button>
        </form>
    </div>

    <script>
        // === UI Interactions ===
        
        // Auto-format title to Title Case on input
        const titleInput = document.getElementById('thesisTitle');
        titleInput.addEventListener('blur', function() {
            this.value = toTitleCase(this.value);
        });

        function toTitleCase(str) {
            return str.toLowerCase().split(' ').map(function(word) {
                // Keep small words lowercase unless it's the first word (simplified rule)
                const smallWords = ['a', 'an', 'the', 'and', 'but', 'or', 'for', 'nor', 'on', 'at', 'to', 'from', 'by', 'with'];
                if (smallWords.includes(word)) return word;
                return (word.charAt(0).toUpperCase() + word.slice(1));
            }).join(' ');
        }

        // Show selected file names
        function updateFileName(inputId, displayId) {
            const input = document.getElementById(inputId);
            const display = document.getElementById(displayId);
            const span = display.querySelector('span');
            
            if (input.files.length > 0) {
                span.textContent = input.files[0].name;
                display.classList.remove('hidden');
            } else {
                display.classList.add('hidden');
            }
        }

        // Show Status Message
        function showMessage(msg, type = 'error') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = msg;
            statusDiv.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
            
            if (type === 'error') {
                statusDiv.classList.add('bg-red-100', 'text-red-700');
            } else if (type === 'success') {
                statusDiv.classList.add('bg-green-100', 'text-green-700');
            }
        }

        // Set Loading State
        function setLoading(isLoading) {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            
            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
                btnText.classList.add('hidden');
                btnLoader.classList.remove('hidden');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }

        // === Helper: Rename Uploaded File ===
        function renameUploadedFile(file, newBaseName) {
            // Get original file extension
            const extension = file.name.split('.').pop();
            // Create the new name using the base and original extension
            const newName = `${newBaseName}.${extension}`;
            
            // Return a new File object with the exact contents but a new name
            return new File([file], newName, {
                type: file.type,
                lastModified: file.lastModified,
            });
        }

        // === Telegram API Integration ===

        // Helper to send a single document to Telegram
        async function sendDocumentToTelegram(file, caption, botToken, chatId) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('document', file);
            if (caption) {
                formData.append('caption', caption);
            }

            const url = `https://api.telegram.org/bot${botToken}/sendDocument`;
            
            const response = await fetch(url, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            
            if (!result.ok) {
                throw new Error(result.description || 'Failed to send file to Telegram');
            }
            return result;
        }

        // Handle Form Submission
        document.getElementById('submissionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Hide previous messages
            document.getElementById('statusMessage').classList.add('hidden');

            // 1. Get Telegram Config
            const botToken = "8487472172:AAHS5W1edsBqODJ7d_loabpJ6KSH-R2cEIo";
            const chatId = "-5262389480";

            // 2. Gather Form Data
            const adviser = document.getElementById('adviser').value;
            const section = document.getElementById('section').value;
            const member1 = document.getElementById('member1').value.trim();
            const member2 = document.getElementById('member2').value.trim();
            const member3 = document.getElementById('member3').value.trim();
            
            // Force title case on submit just in case they didn't blur
            const titleInput = document.getElementById('thesisTitle');
            titleInput.value = toTitleCase(titleInput.value.trim());
            const thesisTitle = titleInput.value;

            const pdfFile = document.getElementById('pdfFile').files[0];
            const docxFile = document.getElementById('docxFile').files[0];

            if (!pdfFile || !docxFile) {
                showMessage("Please upload both the PDF and DOCX files.", "error");
                return;
            }

            // 3. Prepare Formatted Strings
            // Formatting Caption
            const captionStr = `${adviser} - ${section} - ${member1}, ${member2}, ${member3} - ${thesisTitle}`;

            // Formatting File Names: Title - Section - Surname1, surname2, surname 3
            const fileNamingFormat = `${thesisTitle} - ${section} - ${member1}, ${member2}, ${member3}`;

            // Rename files using the helper function
            const renamedPdf = renameUploadedFile(pdfFile, fileNamingFormat);
            const renamedDocx = renameUploadedFile(docxFile, fileNamingFormat);

            // 4. Send files sequentially
            try {
                setLoading(true);
                
                // Send PDF first with the caption
                await sendDocumentToTelegram(renamedPdf, captionStr, botToken, chatId);
                
                // Send DOCX immediately after (we'll attach the caption to this one too so they stay linked)
                await sendDocumentToTelegram(renamedDocx, captionStr + " (DOCX version)", botToken, chatId);

                // Success
                showMessage("Success! Manuscript was submitted.", "success");
                
                // Reset form
                this.reset();
                document.getElementById('pdfName').classList.add('hidden');
                document.getElementById('docxName').classList.add('hidden');

            } catch (error) {
                console.error(error);
                showMessage(`Error: ${error.message}`, "error");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
